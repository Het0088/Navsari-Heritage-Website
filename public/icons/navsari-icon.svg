<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0761b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a16207;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Heritage Building Icon -->
  <g transform="translate(156, 156)">
    <!-- Main Building -->
    <rect x="40" y="80" width="120" height="120" fill="white" opacity="0.9" rx="8"/>
    
    <!-- Building Top -->
    <polygon points="100,60 60,80 140,80" fill="white" opacity="0.9"/>
    
    <!-- Pillars -->
    <rect x="55" y="90" width="8" height="100" fill="#f0761b" opacity="0.8"/>
    <rect x="75" y="90" width="8" height="100" fill="#f0761b" opacity="0.8"/>
    <rect x="115" y="90" width="8" height="100" fill="#f0761b" opacity="0.8"/>
    <rect x="135" y="90" width="8" height="100" fill="#f0761b" opacity="0.8"/>
    
    <!-- Door -->
    <rect x="90" y="150" width="20" height="40" fill="#a16207" rx="3"/>
    
    <!-- Windows -->
    <rect x="70" y="110" width="12" height="12" fill="#a16207" rx="2"/>
    <rect x="120" y="110" width="12" height="12" fill="#a16207" rx="2"/>
    <rect x="70" y="130" width="12" height="12" fill="#a16207" rx="2"/>
    <rect x="120" y="130" width="12" height="12" fill="#a16207" rx="2"/>
    
    <!-- Gujarati Script Style Decoration -->
    <circle cx="100" cy="100" r="3" fill="white"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="128" cy="128" r="4" fill="white" opacity="0.6"/>
  <circle cx="384" cy="384" r="4" fill="white" opacity="0.6"/>
  <circle cx="384" cy="128" r="3" fill="white" opacity="0.4"/>
  <circle cx="128" cy="384" r="3" fill="white" opacity="0.4"/>
</svg> 